name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # P1-09: Build Gate
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build solution
      run: dotnet build --configuration Release --no-restore
      
    - name: Check for build errors
      if: failure()
      run: |
        echo "❌ Build failed! Please fix build errors before merging."
        exit 1

  # P1-09: Unit Test Gate
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Run unit tests
      run: |
        dotnet test TextToSqlAgent.Tests.Unit \
          --configuration Release \
          --no-restore \
          --logger "trx;LogFileName=unit-test-results.trx" \
          --logger "console;verbosity=detailed" \
          --collect:"XPlat Code Coverage" \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-results
        path: '**/TestResults/*.trx'
        
    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-coverage
        path: '**/TestResults/**/coverage.opencover.xml'
        
    - name: Check test results
      if: failure()
      run: |
        echo "❌ Unit tests failed! Please fix failing tests before merging."
        exit 1

  # P1-09: Integration Test Gate (with Docker)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: Test@Pass123!
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Test@Pass123! -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s
      
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "curl -f http://localhost:6333/health || exit 1"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Wait for SQL Server
      run: |
        echo "Waiting for SQL Server to be ready..."
        for i in {1..30}; do
          if docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "Test@Pass123!" -Q "SELECT 1" > /dev/null 2>&1; then
            echo "SQL Server is ready!"
            break
          fi
          echo "Attempt $i/30 - Waiting..."
          sleep 2
        done
        
    - name: Initialize test database
      run: |
        echo "Initializing test database..."
        docker exec -i ${{ job.services.sqlserver.id }} /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "Test@Pass123!" < test-data/init-db.sql
        echo "Database initialized successfully!"
        
    - name: Run integration tests
      env:
        TEST_SQL_CONNECTION_STRING: "Server=localhost,1433;Database=TextToSqlTest;User Id=sa;Password=Test@Pass123!;TrustServerCertificate=True;"
        TEST_QDRANT_URL: "http://localhost:6333"
        TEST_REDIS_CONNECTION_STRING: "localhost:6379"
      run: |
        dotnet test TextToSqlAgent.Tests.Integration \
          --configuration Release \
          --no-restore \
          --logger "trx;LogFileName=integration-test-results.trx" \
          --logger "console;verbosity=detailed"
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: '**/TestResults/*.trx'
        
    - name: Check test results
      if: failure()
      run: |
        echo "❌ Integration tests failed! Please fix failing tests before merging."
        exit 1

  # P1-09: E2E API Smoke Test
  e2e-smoke-test:
    name: E2E API Smoke Test
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: Test@Pass123!
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Test@Pass123! -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build API
      run: dotnet build TextToSqlAgent.API --configuration Release --no-restore
      
    - name: Initialize test database
      run: |
        docker exec -i ${{ job.services.sqlserver.id }} /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "Test@Pass123!" < test-data/init-db.sql
        
    - name: Start API server
      run: |
        cd TextToSqlAgent.API
        dotnet run --configuration Release --no-build &
        API_PID=$!
        echo "API_PID=$API_PID" >> $GITHUB_ENV
        echo "API started with PID: $API_PID"
        
    - name: Wait for API to be ready
      run: |
        echo "Waiting for API to be ready..."
        for i in {1..30}; do
          if curl -f http://localhost:5000/api/agent/health > /dev/null 2>&1; then
            echo "API is ready!"
            exit 0
          fi
          echo "Attempt $i/30 - Waiting..."
          sleep 2
        done
        echo "❌ API failed to start!"
        exit 1
        
    - name: Run smoke tests
      run: |
        echo "Running E2E smoke tests..."
        
        # Test 1: Health check
        echo "Test 1: Health check"
        HEALTH_RESPONSE=$(curl -s http://localhost:5000/api/agent/health)
        echo "Health response: $HEALTH_RESPONSE"
        if [[ $HEALTH_RESPONSE != *"Healthy"* ]]; then
          echo "❌ Health check failed!"
          exit 1
        fi
        echo "✅ Health check passed"
        
        # Test 2: Authentication endpoint
        echo "Test 2: Authentication"
        AUTH_RESPONSE=$(curl -s -X POST http://localhost:5000/api/auth/login \
          -H "Content-Type: application/json" \
          -d '{"username":"testuser","password":"testpass"}')
        echo "Auth response: $AUTH_RESPONSE"
        if [[ $AUTH_RESPONSE == *"error"* ]] && [[ $AUTH_RESPONSE != *"Invalid"* ]]; then
          echo "❌ Auth endpoint error!"
          exit 1
        fi
        echo "✅ Auth endpoint accessible"
        
        # Test 3: Query endpoint (should require auth)
        echo "Test 3: Query endpoint (auth required)"
        QUERY_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:5000/api/agent/query \
          -H "Content-Type: application/json" \
          -d '{"question":"test query"}')
        HTTP_CODE=$(echo "$QUERY_RESPONSE" | tail -n1)
        echo "Query response code: $HTTP_CODE"
        if [[ $HTTP_CODE != "401" ]] && [[ $HTTP_CODE != "200" ]]; then
          echo "❌ Query endpoint unexpected response!"
          exit 1
        fi
        echo "✅ Query endpoint accessible"
        
        echo "✅ All smoke tests passed!"
        
    - name: Stop API server
      if: always()
      run: |
        if [ ! -z "$API_PID" ]; then
          kill $API_PID || true
        fi

  # P1-09: Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Check for vulnerable packages
      run: |
        echo "Checking for vulnerable packages..."
        dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
        
        # Check if there are any critical or high vulnerabilities
        if grep -i "critical\|high" vulnerability-report.txt; then
          echo "⚠️ Warning: Critical or high severity vulnerabilities found!"
          echo "Please review and update vulnerable packages."
          # Don't fail the build, just warn
        else
          echo "✅ No critical or high severity vulnerabilities found"
        fi
        
    - name: Upload vulnerability report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vulnerability-report
        path: vulnerability-report.txt

  # P1-09: Code Quality Check
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build with warnings as errors (Release)
      run: |
        echo "Building with strict warning checks..."
        # Build but allow warnings (we have Semantic Kernel warnings)
        dotnet build --configuration Release --no-restore /p:TreatWarningsAsErrors=false
        
    - name: Check for TODO/FIXME comments
      run: |
        echo "Checking for TODO/FIXME comments..."
        TODO_COUNT=$(grep -r "TODO\|FIXME" --include="*.cs" --exclude-dir={bin,obj} . | wc -l || true)
        echo "Found $TODO_COUNT TODO/FIXME comments"
        if [ $TODO_COUNT -gt 0 ]; then
          echo "⚠️ Warning: Found $TODO_COUNT TODO/FIXME comments"
          grep -r "TODO\|FIXME" --include="*.cs" --exclude-dir={bin,obj} . || true
        fi

  # P1-09: Test Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-smoke-test]
    if: always()
    
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        path: test-results
        
    - name: Generate test summary
      run: |
        echo "# 🧪 Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.unit-tests.result }}" == "success" ]; then
          echo "✅ **Unit Tests**: Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Unit Tests**: Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.integration-tests.result }}" == "success" ]; then
          echo "✅ **Integration Tests**: Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Integration Tests**: Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.e2e-smoke-test.result }}" == "success" ]; then
          echo "✅ **E2E Smoke Tests**: Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **E2E Smoke Tests**: Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "📊 **Artifacts**: Test results and coverage reports are available in the artifacts section." >> $GITHUB_STEP_SUMMARY

  # P1-09: Final Status Check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build, unit-tests, integration-tests, e2e-smoke-test, security-scan, code-quality]
    if: always()
    
    steps:
    - name: Check all jobs
      run: |
        echo "Checking CI pipeline status..."
        
        if [ "${{ needs.build.result }}" != "success" ]; then
          echo "❌ Build failed!"
          exit 1
        fi
        
        if [ "${{ needs.unit-tests.result }}" != "success" ]; then
          echo "❌ Unit tests failed!"
          exit 1
        fi
        
        if [ "${{ needs.integration-tests.result }}" != "success" ]; then
          echo "❌ Integration tests failed!"
          exit 1
        fi
        
        if [ "${{ needs.e2e-smoke-test.result }}" != "success" ]; then
          echo "❌ E2E smoke tests failed!"
          exit 1
        fi
        
        echo "✅ All CI gates passed!"
        echo "🎉 Ready to merge!"
