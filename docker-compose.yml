services:
  api:
    build:
      context: .  # Build từ root để access tất cả projects
      dockerfile: TextToSqlAgent.API/Dockerfile
    ports:
      - "5251:5251"  # Keep development port for consistency
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Đảm bảo resolve được trên mọi OS
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5251
      # SQL Server trên host machine (host.docker.internal)
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal,11433;Database=TextToSqlAgentDB;User Id=sa;Password=Sa_Temp@Bootstrap1;TrustServerCertificate=True;Encrypt=False;
      - Database__ConnectionString=Server=host.docker.internal,11433;Database=TextToSqlAgent;User Id=sa;Password=Sa_Temp@Bootstrap1;TrustServerCertificate=True;Encrypt=False;
      - DATABASE_CONNECTION_STRING=Server=host.docker.internal,11433;Database=TextToSqlAgent;User Id=sa;Password=Sa_Temp@Bootstrap1;TrustServerCertificate=True;Encrypt=False;
      # Qdrant trên host machine
      - Qdrant__Url=http://host.docker.internal:6333
      - QDRANT_URL=http://host.docker.internal:6333
      # JWT và API Keys
      - Jwt__Key=TextToSqlAgentDevKey2024Secure!ThisIsLongEnough32+
      - Jwt__Issuer=TextToSqlAgentAPI
      - Jwt__Audience=TextToSqlAgentClient
      - JWT_SECRET=TextToSqlAgentDevKey2024Secure!ThisIsLongEnough32+
      - JWT_ISSUER=TextToSqlAgentAPI
      - JWT_AUDIENCE=TextToSqlAgentClient
      - OpenAI__ApiKey=
      - OPENAI_API_KEY=
      - Encryption__Key=DefaultEncryptionKey32CharactersLong!
      - ENCRYPTION_KEY=DefaultEncryptionKey32CharactersLong!
      # LLM Provider
      - LLMProvider=OpenAI
      # CORS - Allow frontend access
      - Cors__AllowedOrigins__0=http://localhost:5173
      - Cors__AllowedOrigins__1=https://localhost:5173
      # Python Sidecar
      - INTENT_CLASSIFIER_PROVIDER=Python
      - PYTHON_SIDECAR_URL=http://python-sidecar:8100
      - PYTHON_SIDECAR_TIMEOUT_MS=500
    depends_on:
      - python-sidecar
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5251  # Match API port
    ports:
      - "5173:80"  # Keep development port for consistency
    depends_on:
      - api
    networks:
      - app-network


  python-sidecar:
    build:
      context: ./python-sidecar
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      - MODEL_CACHE_DIR=/app/models/intent_classifier
      - SIDECAR_ADVISORY_ONLY=false
    networks:
      - app-network


networks:
  app-network:
    driver: bridge
