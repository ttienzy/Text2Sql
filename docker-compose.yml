services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: texttosql-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:-YourStrong@Passw0rd}
      SA_PASSWORD: ${SA_PASSWORD:-YourStrong@Passw0rd}
    ports:
      - "11433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" -b -o /dev/null; else /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -b -o /dev/null; fi"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: texttosql-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/healthz || curl -fsS http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: texttosql-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 8
    networks:
      - app-network

  python-sidecar:
    build:
      context: ./python-sidecar
      dockerfile: Dockerfile
    container_name: texttosql-python-sidecar
    ports:
      - "8100:8100"
    environment:
      MODEL_CACHE_DIR: /app/models/intent_classifier
      SIDECAR_ADVISORY_ONLY: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - app-network
    restart: unless-stopped

  db-migrator:
    build:
      context: .
      dockerfile: TextToSqlAgent.Migrator/Dockerfile
    container_name: texttosql-db-migrator
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Development}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=${APP_DB_NAME:-TextToSqlAgentDB};User Id=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;Encrypt=False;
      DATABASE_CONNECTION_STRING: Server=sqlserver,1433;Database=${APP_DB_NAME:-TextToSqlAgentDB};User Id=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;Encrypt=False;
      Qdrant__Url: http://qdrant:6333
      QDRANT_URL: http://qdrant:6333
      Qdrant__CollectionName: ${QDRANT_COLLECTION_NAME:-schema_embeddings_large}
      Qdrant__VectorSize: ${QDRANT_VECTOR_SIZE:-3072}
      Seed__DevelopmentData: ${SEED_DEVELOPMENT_DATA:-true}
    depends_on:
      sqlserver:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  api:
    build:
      context: .
      dockerfile: TextToSqlAgent.API/Dockerfile
    container_name: texttosql-api
    ports:
      - "5251:5251"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5251
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=${APP_DB_NAME:-TextToSqlAgentDB};User Id=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;Encrypt=False;
      DATABASE_CONNECTION_STRING: Server=sqlserver,1433;Database=${APP_DB_NAME:-TextToSqlAgentDB};User Id=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;Encrypt=False;
      Qdrant__Url: http://qdrant:6333
      QDRANT_URL: http://qdrant:6333
      Qdrant__CollectionName: ${QDRANT_COLLECTION_NAME:-schema_embeddings_large}
      Qdrant__VectorSize: ${QDRANT_VECTOR_SIZE:-3072}
      Redis__Connection: redis:6379
      REDIS_CONNECTION: redis:6379
      Jwt__Key: ${JWT_SECRET:-TextToSqlAgentDevKey2024Secure!ThisIsLongEnough32+}
      Jwt__Issuer: ${JWT_ISSUER:-TextToSqlAgentAPI}
      Jwt__Audience: ${JWT_AUDIENCE:-TextToSqlAgentClient}
      JWT_SECRET: ${JWT_SECRET:-TextToSqlAgentDevKey2024Secure!ThisIsLongEnough32+}
      JWT_ISSUER: ${JWT_ISSUER:-TextToSqlAgentAPI}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-TextToSqlAgentClient}
      Encryption__Key: ${ENCRYPTION_KEY:-DefaultEncryptionKey32CharactersLong!}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-DefaultEncryptionKey32CharactersLong!}
      LLMProvider: ${LLM_PROVIDER:-OpenAI}
      OpenAI__ApiKey: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      Gemini__ApiKey: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:5251
      INTENT_CLASSIFIER_PROVIDER: ${INTENT_CLASSIFIER_PROVIDER:-Python}
      PYTHON_SIDECAR_URL: http://python-sidecar:8100
      PYTHON_SIDECAR_TIMEOUT_MS: ${PYTHON_SIDECAR_TIMEOUT_MS:-500}
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      python-sidecar:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5251}
    container_name: texttosql-frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  sqlserver-data:
    driver: local
  qdrant-data:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
