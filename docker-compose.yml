version: '3.8'

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: texttosql-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Sa_Temp@Bootstrap1
      - MSSQL_PID=Developer
    ports:
      - "11433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "Sa_Temp@Bootstrap1" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: texttosql-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: texttosql-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ============================================
  # Application Services
  # ============================================

  api:
    build:
      context: .
      dockerfile: TextToSqlAgent.API/Dockerfile
    container_name: texttosql-api
    ports:
      - "5251:5251"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5251
      # SQL Server
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=TextToSqlAgentDB;User Id=sa;Password=Sa_Temp@Bootstrap1;TrustServerCertificate=True;Encrypt=False;
      - Database__ConnectionString=Server=sqlserver,1433;Database=TextToSqlAgent;User Id=sa;Password=Sa_Temp@Bootstrap1;TrustServerCertificate=True;Encrypt=False;
      - DATABASE_CONNECTION_STRING=Server=sqlserver,1433;Database=TextToSqlAgent;User Id=sa;Password=Sa_Temp@Bootstrap1;TrustServerCertificate=True;Encrypt=False;
      # Qdrant
      - Qdrant__Url=http://qdrant:6333
      - QDRANT_URL=http://qdrant:6333
      # Redis
      - Redis__ConnectionString=redis:6379
      - REDIS_CONNECTION_STRING=redis:6379
      # JWT
      - Jwt__Key=TextToSqlAgentDevKey2024Secure!ThisIsLongEnough32+
      - Jwt__Issuer=TextToSqlAgentAPI
      - Jwt__Audience=TextToSqlAgentClient
      - JWT_SECRET=TextToSqlAgentDevKey2024Secure!ThisIsLongEnough32+
      - JWT_ISSUER=TextToSqlAgentAPI
      - JWT_AUDIENCE=TextToSqlAgentClient
      # OpenAI
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Encryption
      - Encryption__Key=DefaultEncryptionKey32CharactersLong!
      - ENCRYPTION_KEY=DefaultEncryptionKey32CharactersLong!
      # LLM Provider
      - LLMProvider=OpenAI
      # CORS
      - Cors__AllowedOrigins__0=http://localhost:5173
      - Cors__AllowedOrigins__1=https://localhost:5173
      # Python Sidecar
      - INTENT_CLASSIFIER_PROVIDER=Python
      - PYTHON_SIDECAR_URL=http://python-sidecar:8100
      - PYTHON_SIDECAR_TIMEOUT_MS=500
    depends_on:
      sqlserver:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-sidecar:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://api:5251
    container_name: texttosql-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

  python-sidecar:
    build:
      context: ./python-sidecar
      dockerfile: Dockerfile
    container_name: texttosql-python-sidecar
    ports:
      - "8100:8100"
    environment:
      - MODEL_CACHE_DIR=/app/models/intent_classifier
      - SIDECAR_ADVISORY_ONLY=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

# ============================================
# Volumes
# ============================================

volumes:
  sqlserver-data:
    driver: local
  qdrant-data:
    driver: local
  redis-data:
    driver: local

# ============================================
# Networks
# ============================================

networks:
  app-network:
    driver: bridge