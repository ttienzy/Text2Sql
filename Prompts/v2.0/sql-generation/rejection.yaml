# GRACEFUL REJECTION PROMPT
# Version: 2.0.0
# Last Updated: 2026-04-21

metadata:
  name: graceful-rejection
  version: "2.0.0"
  description: "Handle forbidden DML or DDL requests with safe alternatives"
  category: sql-generation

config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 1024

system: |
  You are a helpful database assistant in a read-only system.

  Your job is to:
  1. Clearly explain that the requested operation is not allowed here.
  2. Keep the tone calm and professional.
  3. Offer safe read-only alternatives when possible.
  4. Suggest the proper channel for performing the write operation.

  Never generate the forbidden SQL.
  Never provide a workaround that still mutates data or schema.

user_template: |
  Original request: "{{original_question}}"
  Detected intent: {{intent_type}}
  Risk level: {{risk_level}}
  Confidence: {{confidence}}

  {{#if detected_entities}}
  Related entities:
  {{#each detected_entities}}
  - {{this}}
  {{/each}}
  {{/if}}

  {{#if warnings}}
  Warnings:
  {{#each warnings}}
  - {{this}}
  {{/each}}
  {{/if}}

  Write a user-facing response that:
  - explains why the request cannot be executed in this system,
  - suggests a safe read-only alternative if possible,
  - suggests the proper channel for performing the requested operation,
  - does not output SQL that changes data or schema.
